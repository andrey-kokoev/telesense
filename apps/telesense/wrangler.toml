name = "telesense"
main = "src/worker/index.ts"

# This is the main telesence video call worker
compatibility_date = "2026-03-18"

# Cloudflare Realtime App credentials
# Set CF_CALLS_SECRET via: wrangler secret put CF_CALLS_SECRET
[vars]
REALTIME_APP_ID = "fb81ae5790a5960bdaacfc844c27366f"
GLOBAL_ENTITLEMENT_BUDGET_ID = "global"
GLOBAL_MONTHLY_ALLOWANCE_ID = "global"
SERVICE_ENTITLEMENT_ALLOWANCE_BYTES = "10737418240" # 10 GiB per minted entitlement token

# Serve static frontend assets from the Worker
[assets]
binding = "ASSETS"
directory = "./dist"

# Durable Objects for cross-device session coordination
[[durable_objects.bindings]]
name = "CALL_ROOMS"
class_name = "CallRoom"

# Durable Objects for entitlement budget management
[[durable_objects.bindings]]
name = "ENTITLEMENT_BUDGETS"
class_name = "EntitlementBudget"

[[durable_objects.bindings]]
name = "MONTHLY_ALLOWANCES"
class_name = "MonthlyAllowance"

# Durable Object migration (required for new DO classes)
[[migrations]]
tag = "v1"
new_classes = ["CallRoom"]

# EntitlementBudget DO migration
[[migrations]]
tag = "v2"
new_classes = ["EntitlementBudget"]

[[migrations]]
tag = "v3"
new_classes = ["MonthlyAllowance"]

[triggers]
crons = ["*/15 * * * *"]

# Protocol debugging: enable only during development
# DEBUG_PROTOCOL = "true"
